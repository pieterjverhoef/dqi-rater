<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DQI Rater — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-page">

  <header class="dash-header">
    <div class="header-left">
      <button id="btn-logout" class="btn-text">← Logout</button>
      <span class="user-display">Pieter — Admin</span>
    </div>
    <h1 class="dash-title">Dashboard</h1>
    <div class="header-right">
      <button id="btn-export-csv" class="btn btn-sm">Export CSV</button>
      <button id="btn-export-json" class="btn btn-sm">Export JSON</button>
    </div>
  </header>

  <main class="dash-main">

    <!-- Set selector -->
    <div id="set-selector" class="dash-section">
      <h2>Select Image Set</h2>
      <div id="set-list" class="set-list"></div>
      <p id="no-sets-msg" class="hint hidden">No image sets available yet.</p>
    </div>

    <!-- Summary cards (hidden until set is selected) -->
    <div id="dash-content" class="hidden">

      <div class="summary-cards">
        <div class="summary-card">
          <span class="card-value" id="card-total">—</span>
          <span class="card-label">Total images</span>
        </div>
        <div class="summary-card">
          <span class="card-value" id="card-rated">—</span>
          <span class="card-label">Fully rated</span>
        </div>
        <div class="summary-card">
          <span class="card-value" id="card-agreement">—</span>
          <span class="card-label">Full agreement</span>
        </div>
        <div class="summary-card">
          <span class="card-value" id="card-avg-diff">—</span>
          <span class="card-label">Avg. rater vs algorithm</span>
        </div>
      </div>

      <!-- Per-image table -->
      <div class="table-wrap">
        <table id="dash-table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Algorithm</th>
              <th>Cobus</th>
              <th>Marius</th>
              <th>Agreement</th>
              <th>Avg vs Algo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="dash-tbody"></tbody>
        </table>
      </div>

    </div>
  </main>

  <!-- ===================== Detail slide panel ===================== -->
  <div id="detail-overlay" class="detail-overlay hidden"></div>

  <div id="detail-panel" class="detail-panel">
    <div class="detail-header">
      <button id="detail-close" class="btn btn-sm">✕ Close</button>
      <span id="detail-image-name" class="detail-title"></span>
      <div class="detail-nav">
        <button id="detail-prev" class="btn btn-sm">◀ Prev</button>
        <span id="detail-pos" class="detail-pos-label"></span>
        <button id="detail-next" class="btn btn-sm">Next ▶</button>
      </div>
    </div>

    <div class="detail-body">

      <!-- Left: images -->
      <div class="detail-images">
        <div class="detail-img-row">
          <div class="detail-img-panel">
            <span class="panel-label">Original</span>
            <div class="panel-container">
              <img id="detail-img-original" alt="original" />
            </div>
          </div>
          <div class="detail-img-panel">
            <span class="panel-label">FPC Result</span>
            <div class="panel-container" id="detail-fpc-container">
              <img id="detail-img-fpc" alt="fpc result" />
              <canvas id="detail-grid-canvas"></canvas>
              <div id="detail-hover-tooltip" class="hover-tooltip hidden"></div>
            </div>
          </div>
        </div>
        <div class="detail-img-controls">
          <label>
            <input type="checkbox" id="detail-toggle-grid" />
            Show Grid Overlay
          </label>
        </div>
      </div>

      <!-- Right: ratings + Pieter notes -->
      <div class="detail-sidebar">

        <div class="detail-score-block">
          <div class="detail-score-row">
            <span class="detail-score-label">Algorithm</span>
            <span id="detail-algo-badge" class="score-badge s0">—</span>
          </div>
          <hr class="detail-divider" />
          <div class="detail-score-row">
            <span class="detail-score-label">Cobus</span>
            <span id="detail-cobus-badge" class="score-badge s0">—</span>
          </div>
          <p id="detail-cobus-reasoning" class="detail-reasoning"></p>
          <div class="detail-score-row">
            <span class="detail-score-label">Marius</span>
            <span id="detail-marius-badge" class="score-badge s0">—</span>
          </div>
          <p id="detail-marius-reasoning" class="detail-reasoning"></p>
          <div id="detail-agreement-badge" class="detail-agreement-badge"></div>
        </div>

        <div class="detail-notes-block">
          <label class="detail-notes-label">Pieter's notes</label>
          <textarea id="detail-pieter-note" class="detail-notes-textarea"
                    placeholder="Add your analysis notes here…"></textarea>
          <div class="detail-notes-footer">
            <button id="detail-save-note" class="btn btn-sm">Save Note</button>
            <span id="detail-note-saved" class="detail-note-saved hidden">✓ Saved</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
